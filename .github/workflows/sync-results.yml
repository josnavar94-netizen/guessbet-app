name: Sync resultados Mundial 2026

on:
  schedule:
    # Cada 2 horas. El cron diario de Vercel (00:00) sigue existiendo como respaldo;
    # este workflow cubre las horas intermedias que el plan Hobby de Vercel no permite.
    # Nota: GitHub no garantiza el minuto exacto en horas de carga alta, puede llegar
    # con unos minutos de retraso — suficiente para detectar partidos recién terminados.
    - cron: '0 */2 * * *'
  workflow_dispatch: {} # permite correrlo manualmente desde la pestaña Actions de GitHub

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Llamar a /api/cron/sync-results
        run: |
          curl -sf -w "\nHTTP %{http_code}\n" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://guessbet.vercel.app/api/cron/sync-results
      - name: Sincronizar goleadores
        run: |
          curl -sf -w "\nHTTP %{http_code}\n" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://guessbet.vercel.app/api/cron/sync-scorers
