name: Sync Lineups (cada 5 min)

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Call sync-lineups
        run: |
          curl -s -X GET "https://guessbet.vercel.app/api/cron/sync-lineups" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            --fail --show-error
