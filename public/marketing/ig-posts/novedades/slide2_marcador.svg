8" font-family="Segoe UI, Arial, sans-serif" font-size="58" font-weight="900" fill="#C9A227" text-anchor="middle">exacto.</text><text x="540" y="472" font-family="Segoe UI, Arial, sans-serif" font-size="26" fill="rgba(255,255,255,0.45)" text-anchor="middle">Ahora sabes el resultado más probable, no solo el ganador.</text><line x1="60" y1="510" x2="1020" y2="510" stroke="rgba(255,255,255,0.07)" stroke-width="1"/><rect x="60" y="544" width="960" height="108" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(201,162,39,0.12)" stroke-width="1"/><rect x="60" y="544" width="5" height="108" rx="2" fill="#C9A227"/><text x="86" y="586" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700" fill="#ffffff">El modelo calcula los 6 marcadores más probables</text><text x="86" y="620" font-family="Segoe UI, Arial, sans-serif" font-size="23" fill="rgba(255,255,255,0.52)">con su porcentaje y su cuota justa.</text><rect x="60" y="672" width="960" height="108" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(201,162,39,0.12)" stroke-width="1"/><rect x="60" y="672" width="5" height="108" rx="2" fill="#C9A227"/><text x="86" y="714" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700" fill="#ffffff">El resultado más probable aparece destacado</text><text x="86" y="748" font-family="Segoe UI, Arial, sans-serif" font-size="23" fill="rgba(255,255,255,0.52)">para que no tengas que interpretar nada.</text><rect x="60" y="800" width="960" height="108" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(201,162,39,0.12)" stroke-width="1"/><rect x="60" y="800" width="5" height="108" rx="2" fill="#C9A227"/><text x="86" y="842" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700" fill="#ffffff">1-0, 0-0, 2-1...</text><text x="86" y="876" font-family="Segoe UI, Arial, sans-serif" font-size="23" fill="rgba(255,255,255,0.52)">con probabilidad real, no intuición.</text><rect x="130" y="964" width="820" height="66" rx="33" fill="url(#gol